<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive TV Wall</title>

    <!-- Preconnect for video sources -->
    <link rel="preconnect" href="https://www.youtube.com">
    <link rel="preconnect" href="https://player.twitch.tv">
    <link rel="preconnect" href="https://clips.twitch.tv">
    <link rel="preconnect" href="https://pluto.tv">

    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .grid {
            display: grid;
            height: 100vh;
            width: 100vw;
            gap: 8px;
            padding: 8px;
            box-sizing: border-box;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
        }

        .tv {
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.6);
            content-visibility: auto;
            contain-intrinsic-size: 720px;
        }

        .tv iframe {
            border: none;
            display: block;
        }

        .scaled-wrapper {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            background: #0b0b0b;
        }

        .scaled-viewport {
            position: absolute;
            left: 0;
            top: 0;
            transform-origin: 0 0;
            transform: translateZ(0);
            will-change: transform;
            backface-visibility: hidden;
        }

        .url-bar {
            position: absolute;
            left: 8px;
            right: 8px;
            top: 8px;
            display: flex;
            gap: 6px;
            z-index: 5;
        }

        .url-bar input {
            flex: 1;
            padding: 6px 8px;
            border-radius: 6px;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            outline: none;
        }

        .url-bar button {
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            background: #1f8ef1;
            color: #fff;
            cursor: pointer;
        }

        @media (max-aspect-ratio:4/3) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(3, 1fr);
            }
        }
    </style>
</head>

<body>

    <div class="grid">
        <div class="tv"></div>
        <div class="tv"></div>
        <div class="tv"></div>
        <div class="tv"></div>
        <div class="tv"></div>
        <div class="tv"></div>
    </div>

    <script>
        const BASE_W = 1280;
        const BASE_H = 720;
        const LOAD_DELAY = 1500;

        const defaultUrls = [
            'https://s365z2.bbvipalb.cc/k1.php',
            'https://www.oranews.tv/livetv2.php',
            'https://www.twitch.tv/topmedia_topnews',
            'https://pluto.tv/us/live-tv/5421f71da6af422839419cb3',
            'https://pluto.tv/us/live-tv/5dc9b8223687ff000936ed79',
            'https://pluto.tv/us/live-tv/63d025db4e83e700086eaa96'
        ];

        // ----- Detect if device is TV / large fullscreen -----
        function detectMode() {
            const isFullscreen = window.innerWidth >= 1920 && window.innerHeight >= 1080;
            const coarsePointer = window.matchMedia("(pointer: coarse)").matches;
            return (isFullscreen || coarsePointer) ? 'tv' : 'desktop';
        }

        const mode = detectMode();

        // ----- Embed URL converter -----
        function toEmbed(url) {
            try {
                const maybe = url.startsWith('http') ? url : 'https://' + url;
                const u = new URL(maybe);
                if (u.hostname.includes('youtube.com')) {
                    const v = u.searchParams.get('v');
                    if (v) return 'https://www.youtube.com/embed/' + v;
                }
                if (u.hostname === 'youtu.be') {
                    const id = u.pathname.slice(1);
                    if (id) return 'https://www.youtube.com/embed/' + id;
                }
                if (u.hostname.includes('twitch.tv') || u.hostname === 'clips.twitch.tv') {
                    const parent = window.location.hostname || 'localhost';
                    const parts = u.pathname.split('/').filter(Boolean);
                    const channel = parts[0] || '';
                    if (channel) return 'https://player.twitch.tv/?channel=' + channel + '&parent=' + parent + '&autoplay=true';
                }
                return url;
            } catch {
                return url;
            }
        }

        // ----- GPU Scaling -----
        function updateScale(card) {
            const wrapper = card.querySelector('.scaled-wrapper');
            const viewport = card.querySelector('.scaled-viewport');
            if (!wrapper || !viewport) return;
            const cw = wrapper.clientWidth;
            const ch = wrapper.clientHeight;
            const scale = Math.min(cw / BASE_W, ch / BASE_H, 1);
            viewport.style.transform = `translate3d(0,0,0) scale(${scale})`;
            viewport.style.width = BASE_W + 'px';
            viewport.style.height = BASE_H + 'px';
            viewport.style.top = Math.max(0, (ch - BASE_H * scale) / 2) + 'px';
            viewport.style.left = Math.max(0, (cw - BASE_W * scale) / 2) + 'px';
        }

        // ----- Card creation -----
        function createCard(card, index) {
            const urlBar = document.createElement('div');
            urlBar.className = 'url-bar';

            const input = document.createElement('input');
            input.type = 'text';
            const saved = localStorage.getItem('tv' + index);
            input.value = saved || defaultUrls[index] || '';

            const btn = document.createElement('button');
            btn.textContent = 'Load';

            urlBar.append(input, btn);

            const wrapper = document.createElement('div');
            wrapper.className = 'scaled-wrapper';
            const viewport = document.createElement('div');
            viewport.className = 'scaled-viewport';
            wrapper.append(viewport);

            card.append(wrapper);
            if (mode === 'desktop') {
                card.append(urlBar); // show URL bars only on desktop
            }

            function unload() { viewport.innerHTML = ''; }

            function load(url) {
                if (!url) return;
                localStorage.setItem('tv' + index, url);
                const safe = toEmbed(url);
                const iframe = document.createElement('iframe');
                iframe.src = safe;
                iframe.width = BASE_W;
                iframe.height = BASE_H;
                iframe.loading = 'lazy';
                iframe.setAttribute('allowfullscreen', '');
                iframe.setAttribute('allow', 'autoplay;fullscreen;encrypted-media');
                viewport.innerHTML = '';
                viewport.append(iframe);
                requestAnimationFrame(() => updateScale(card));
            }

            btn.onclick = () => load(input.value.trim());
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') load(input.value.trim());
            });

            return { card, input, load, unload };
        }

        // ----- Initialize cards -----
        const cards = document.querySelectorAll('.tv');
        const controllers = [];
        cards.forEach((card, i) => {
            controllers.push(createCard(card, i));
        });

        // ----- Sequential load for performance -----
        function loadSequentially() {
            controllers.forEach((c, i) => {
                const url = c.input.value.trim();
                if (!url) return;
                setTimeout(() => { c.load(url); }, i * LOAD_DELAY);
            });
        }

        // ----- Start -----
        window.addEventListener('load', () => {
            loadSequentially();
        }, { passive: true });

        // ----- Resize throttling -----
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => { cards.forEach(updateScale); }, 120);
        }, { passive: true });
    </script>
</body>

</html>
